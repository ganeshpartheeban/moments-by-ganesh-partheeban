<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" width="720" height="720">
  <!-- Brand: Moments by Ganesh Partheeban -->
  <!-- Cream background matches site; serif M monogram with terracotta accent dot. -->
  <rect width="720" height="720" fill="#f4ede2"/>

  <!-- Hairline editorial frame -->
  <rect x="40" y="40" width="640" height="640" fill="none" stroke="#0f0e0c" stroke-width="1.2" opacity="0.35"/>

  <!-- Serif M monogram, centered -->
  <text x="360" y="430"
        text-anchor="middle"
        font-family="'Fraunces', 'Cormorant Garamond', 'Times New Roman', Georgia, serif"
        font-size="380"
        font-weight="500"
        fill="#0f0e0c"
        letter-spacing="-12">M</text>

  <!-- Accent dot — the "Moments." flourish from the brand wordmark -->
  <circle cx="490" cy="412" r="16" fill="#c87560"/>

  <!-- Tracked wordmark below -->
  <text x="360" y="555"
        text-anchor="middle"
        font-family="'Inter Tight', 'Inter', system-ui, sans-serif"
        font-size="22"
        font-weight="500"
        letter-spacing="6"
        fill="#0f0e0c">MOMENTS</text>

  <text x="360" y="595"
        text-anchor="middle"
        font-family="'Inter Tight', 'Inter', system-ui, sans-serif"
        font-size="13"
        font-weight="400"
        letter-spacing="3.5"
        fill="#76695a">BY GANESH PARTHEEBAN</text>

  <!-- Small framing tick marks at corners for editorial feel -->
  <g stroke="#c87560" stroke-width="2" fill="none" opacity="0.7">
    <path d="M40 80 L40 40 L80 40"/>
    <path d="M640 40 L680 40 L680 80"/>
    <path d="M680 640 L680 680 L640 680"/>
    <path d="M80 680 L40 680 L40 640"/>
  </g>
</svg>
